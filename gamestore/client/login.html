<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login – Card Store</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body data-page="login">

<header class="hero-header">
    <div class="hero-title">
        <h1>Card Store</h1>
        <p class="tagline">Manage and Explore Your Collection</p>
    </div>
    <nav class="hero-nav">
        <a href="user.html"     class="nav-link">Home</a>
        <a href="index.html" class="nav-link" data-auth="true" data-role="admin" style="display:none">Inventory</a>
<a href="add.html" class="nav-link" data-auth="true" data-role="admin" style="display:none">Add Card</a>
        <a href="login.html"    class="nav-link" data-auth="false">Login</a>
        <a href="register.html" class="nav-link" data-auth="false">Register</a>
        <span id="userGreeting" class="user-greeting" style="display:none"></span>
        <button id="logoutBtn"  class="nav-link btn-logout" data-auth="true" style="display:none">Logout</button>
    </nav>
</header>

<main class="auth-main">
    <form id="loginForm" class="auth-form">
        <h2>Sign In</h2>
        <p class="auth-sub">Welcome back to your collection</p>

        <div id="loginMsg" class="msg" style="display:none"></div>

        <label>Email</label>
        <input type="email" id="email" placeholder="you@example.com" required>

        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••" required>

        <button type="submit" class="btn">Sign In</button>

        <p class="auth-footer">
            Don't have an account? <a href="register.html">Register here</a>
        </p>
    </form>
</main>

<script src="app.js"></script>
</body>
</html>
